# Codentra API — Railway staging/production deploy
# Web (@codentra/web) should deploy on Vercel, not Railway.

[build]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @codentra/api build && cd apps/api && npx prisma migrate deploy"

[deploy]
startCommand = "node apps/api/dist/main.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
