services:
  postgres:
    image: postgres:16-alpine
    container_name: codentra-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: codentra
      POSTGRES_PASSWORD: codentra
      POSTGRES_DB: codentra
    volumes:
      - codentra_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codentra -d codentra']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  codentra_pg_data:
