################################################################################
# Judge0 CE — local development configuration (infra/judge0)
# Production: deploy Judge0 separately and point JUDGE0_API_URL at that host.
################################################################################

JUDGE0_TELEMETRY_ENABLE=false

# Redis (service name in docker-compose)
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0_redis_dev

# PostgreSQL (service name in docker-compose)
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_postgres_dev

# Optional API auth — leave empty for local dev (no token required)
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=
